<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft warm background circle -->
  <circle cx="50" cy="50" r="48" fill="#FFF8F4" stroke="#FF7A59" stroke-width="2" />
  
  <!-- Cat Ears -->
  <path d="M 30 45 L 20 20 L 42 32 Z" fill="#FF7A59" />
  <path d="M 70 45 L 80 20 L 58 32 Z" fill="#FF7A59" />
  
  <!-- Inner Ears (Pinkish) -->
  <path d="M 31 42 L 24 25 L 39 33 Z" fill="#FFB2A0" />
  <path d="M 69 42 L 76 25 L 61 33 Z" fill="#FFB2A0" />
  
  <!-- Cat Head / Body -->
  <path d="M 20 50 C 20 35, 80 35, 80 50 C 80 75, 20 75, 20 50 Z" fill="#FF7A59" />
  
  <!-- Cat Eyes -->
  <circle cx="40" cy="48" r="4" fill="#2D3748" />
  <circle cx="60" cy="48" r="4" fill="#2D3748" />
  <!-- Eye highlights -->
  <circle cx="39" cy="47" r="1.2" fill="#FFFFFF" />
  <circle cx="59" cy="47" r="1.2" fill="#FFFFFF" />
  
  <!-- Cat Nose -->
  <polygon points="50,54 47,51 53,51" fill="#FFB2A0" />
  
  <!-- Cat Mouth -->
  <path d="M 46 56 Q 50 59 50 56 Q 50 59 54 56" fill="none" stroke="#2D3748" stroke-width="2" stroke-linecap="round" />
  
  <!-- Cat Whiskers -->
  <line x1="15" y1="52" x2="3" y2="51" stroke="#FF7A59" stroke-width="2" stroke-linecap="round" />
  <line x1="15" y1="58" x2="2" y2="60" stroke="#FF7A59" stroke-width="2" stroke-linecap="round" />
  <line x1="85" y1="52" x2="97" y2="51" stroke="#FF7A59" stroke-width="2" stroke-linecap="round" />
  <line x1="85" y1="58" x2="98" y2="60" stroke="#FF7A59" stroke-width="2" stroke-linecap="round" />
  
  <!-- Heart Symbol representing health/care -->
  <path d="M 50 68 C 50 68, 43 62, 43 59 C 43 56.5, 45 55, 47 55 C 49 55, 50 57, 50 57 C 50 57, 51 55, 53 55 C 55 55, 57 56.5, 57 59 C 57 62, 50 68, 50 68 Z" fill="#E53E3E" />
</svg>
